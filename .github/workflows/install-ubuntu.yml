name: Install on Ubuntu

on:
  - push
  - pull_request

jobs:
  install:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        shell:
          - bash
          - dash
          - ksh
          - sh
          - zsh
        script:
          - install.sh
      fail-fast: false

    steps:
      - uses: actions/checkout@v2
      - name: Install shell
        run: sudo apt-get install -y ${{ matrix.shell }}
        if: ${{ matrix.shell != 'sh' }}
      - name: Run installation script
        env:
          PNPM_HOME: /tmp/pnpm-home
        run: ENV="~/.${{ matrix.shell }}rc" SHELL="$(which ${{ matrix.shell }})" ${{ matrix.shell }} ${{ matrix.script }}
      - name: Verify pnpm works
        run: |
          tmpdir=$(mktemp -d)
          cd "$tmpdir"
          echo '{}' > package.json
          PATH="/tmp/pnpm-home:$PATH" PNPM_HOME=/tmp/pnpm-home pnpm add webpack
          test -f node_modules/webpack/package.json
