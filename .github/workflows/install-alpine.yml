name: Install on Alpine Linux

on:
  - push
  - pull_request

jobs:
  install:
    runs-on: ubuntu-latest
    container: alpine:latest
    strategy:
      matrix:
        shell:
          - bash
          - dash
          - sh
          # - zsh
        pnpm_version:
          - '10.30.1'  # v10: single-binary download
          - 'next-11'  # v11: tarball download
        script:
          - install.sh
      fail-fast: false

    steps:
      - uses: actions/checkout@v2
      - name: Install shell
        run: apk add ${{ matrix.shell }}
        if: ${{ matrix.shell != 'sh' }}
      - name: Resolve pnpm version
        run: |
          tag="${{ matrix.pnpm_version }}"
          if echo "$tag" | grep -qE '^[0-9]'; then
            echo "PNPM_VERSION=$tag" >> "$GITHUB_ENV"
          else
            if command -v curl > /dev/null 2>&1; then
              json=$(curl -fsSL "https://registry.npmjs.org/@pnpm/exe")
            else
              json=$(wget -qO- "https://registry.npmjs.org/@pnpm/exe")
            fi
            version=$(echo "$json" | grep -o "\"$tag\":[[:space:]]*\"[^\"]*\"" | grep -o '"[0-9][^"]*"' | tr -d '"')
            echo "PNPM_VERSION=$version" >> "$GITHUB_ENV"
          fi
      - name: Run installation script
        env:
          PNPM_HOME: /tmp/pnpm-home
        run: ENV="~/.${{ matrix.shell }}rc" SHELL="$(which ${{ matrix.shell }})" ${{ matrix.shell }} ${{ matrix.script }}
      - name: Verify pnpm works
        run: |
          tmpdir=$(mktemp -d)
          cd "$tmpdir"
          echo '{}' > package.json
          PATH="/tmp/pnpm-home:$PATH" PNPM_HOME=/tmp/pnpm-home pnpm add webpack
          test -f node_modules/webpack/package.json
